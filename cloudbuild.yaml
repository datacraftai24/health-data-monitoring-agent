# Google Cloud Build configuration for MetaboCoach
# Builds and deploys to Cloud Run

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/metabocoach:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/metabocoach:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/metabocoach:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/metabocoach:latest']

  # Deploy API to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'metabocoach-api'
      - '--image=gcr.io/$PROJECT_ID/metabocoach:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=APP_ENV=production'
      # Telegram is primary channel; Twilio secrets are optional (add when enabling WhatsApp)
      - '--set-secrets=DATABASE_URL=metabocoach-db-url:latest,REDIS_URL=metabocoach-redis-url:latest,GEMINI_API_KEY=metabocoach-gemini-key:latest,TELEGRAM_BOT_TOKEN=metabocoach-telegram-token:latest'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--port=8000'

substitutions:
  _REGION: us-central1

images:
  - 'gcr.io/$PROJECT_ID/metabocoach:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/metabocoach:latest'

options:
  logging: CLOUD_LOGGING_ONLY
