# Google Cloud Build configuration for MetaboCoach
# Builds and deploys API, Celery worker, and Celery beat to Cloud Run

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/metabocoach:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/metabocoach:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/metabocoach:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/metabocoach:latest']

  # Run database migrations
  - name: 'gcr.io/$PROJECT_ID/metabocoach:$COMMIT_SHA'
    entrypoint: 'alembic'
    args: ['upgrade', 'head']
    secretEnv: ['DATABASE_URL_SYNC']

  # Deploy API to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'metabocoach-api'
      - '--image=gcr.io/$PROJECT_ID/metabocoach:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=APP_ENV=production'
      - '--set-secrets=DATABASE_URL=metabocoach-db-url:latest,DATABASE_URL_SYNC=metabocoach-db-url-sync:latest,REDIS_URL=metabocoach-redis-url:latest,GEMINI_API_KEY=metabocoach-gemini-key:latest,TELEGRAM_BOT_TOKEN=metabocoach-telegram-token:latest,LIBRE_EMAIL=metabocoach-libre-email:latest,LIBRE_PASSWORD=metabocoach-libre-password:latest,LIBRE_REGION=metabocoach-libre-region:latest'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--port=8000'

  # Deploy Celery Worker to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'metabocoach-worker'
      - '--image=gcr.io/$PROJECT_ID/metabocoach:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--command=/app/scripts/start_worker.sh'
      - '--set-env-vars=APP_ENV=production'
      - '--set-secrets=DATABASE_URL=metabocoach-db-url:latest,DATABASE_URL_SYNC=metabocoach-db-url-sync:latest,REDIS_URL=metabocoach-redis-url:latest,GEMINI_API_KEY=metabocoach-gemini-key:latest,TELEGRAM_BOT_TOKEN=metabocoach-telegram-token:latest,LIBRE_EMAIL=metabocoach-libre-email:latest,LIBRE_PASSWORD=metabocoach-libre-password:latest,LIBRE_REGION=metabocoach-libre-region:latest'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=3'
      - '--port=8000'

  # Deploy Celery Beat to Cloud Run (singleton)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'metabocoach-beat'
      - '--image=gcr.io/$PROJECT_ID/metabocoach:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--command=/app/scripts/start_beat.sh'
      - '--set-env-vars=APP_ENV=production'
      - '--set-secrets=DATABASE_URL=metabocoach-db-url:latest,REDIS_URL=metabocoach-redis-url:latest'
      - '--memory=256Mi'
      - '--cpu=0.5'
      - '--min-instances=1'
      - '--max-instances=1'
      - '--port=8000'

  # Register Telegram webhook to Cloud Run API URL
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVICE_URL=$$(gcloud run services describe metabocoach-api --region=${_REGION} --format='value(status.url)')
        BOT_TOKEN=$$(gcloud secrets versions access latest --secret=metabocoach-telegram-token)
        WEBHOOK_URL="$${SERVICE_URL}/webhook/telegram"
        curl -s "https://api.telegram.org/bot$${BOT_TOKEN}/setWebhook?url=$${WEBHOOK_URL}"
        echo ""
        echo "Telegram webhook set to: $${WEBHOOK_URL}"

substitutions:
  _REGION: us-central1

images:
  - 'gcr.io/$PROJECT_ID/metabocoach:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/metabocoach:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/metabocoach-db-url-sync/versions/latest
      env: DATABASE_URL_SYNC

options:
  logging: CLOUD_LOGGING_ONLY
