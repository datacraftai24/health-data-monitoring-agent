# Google App Engine configuration (alternative to Cloud Run)
runtime: python312
entrypoint: gunicorn -w 4 -k uvicorn.workers.UvicornWorker src.main:app --bind :$PORT

instance_class: F2

automatic_scaling:
  min_instances: 1
  max_instances: 10
  target_cpu_utilization: 0.65

env_variables:
  APP_ENV: "production"

# Secrets are loaded from Secret Manager via settings
# See: https://cloud.google.com/appengine/docs/standard/python3/config/appref
